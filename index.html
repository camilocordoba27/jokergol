<!-- /public/index.html -->
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="style.css">
    <title>JokerGol | Gira y Gana</title>
  </head>

  <body>
    <div class="panel">
      <div class="topbar">
        <div class="brand"><span class="dot"></span> JokerGol</div>

        <div class="counter">
          <div class="box">
            <b id="playersCount">0</b>
            <span>personas obtuvieron la promo hoy</span>
          </div>
        </div>

        <div class="actions">
          <a class="btn" href="https://trkrdr0.com/link/yv1dCOSZ3n" target="_blank" rel="noopener noreferrer">Registro</a>
        </div>
      </div>

      <div class="content">
        <h1>Gira y Gana <span>!</span></h1>

        <div class="wheel-area">
          <div class="pointer" aria-hidden="true"></div>
          <canvas id="wheel" width="420" height="420"></canvas>

          <div class="controls">
            <button class="btn" id="spinBtn" type="button">GIRAR</button>
            <button class="btn secondary" id="resetBtn" type="button">REINICIAR</button>
          </div>
        </div>

        <div class="payments-box">
          <div class="payments-title">Métodos de pagos disponibles</div>
          <div class="payments-grid">
            <div class="pay-method"><img src="img/mach.png" alt="Mach" /></div>
            <div class="pay-method"><img src="img/banco.png" alt="Banco" /></div>
            <div class="pay-method"><img src="img/skrill.png" alt="Skrill" /></div>
            <div class="pay-method"><img src="img/webpay.png" alt="Webpay" /></div>
          </div>
          <div class="payments-note">+18 | Aplican T&amp;C | Juega responsablemente</div>
        </div>
      </div>

      
    </div>

    <!-- Winner popup -->
    <div class="overlay" id="popupOverlay" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
      <div class="popup">
        <h3 id="popupTitle">¡Ganaste!</h3>
        <p id="popupText">Quiero obtener la promo</p>
        <div class="actions">
          <a class="btn" id="claimBtn" href="https://TU-LINK-REGISTRO.com" target="_blank" rel="noopener noreferrer">
            QUIERO OBTENER LA PROMO
          </a>
          <button class="close" id="closePopup" type="button">Cerrar</button>
        </div>
      </div>
    </div>

    <!-- ✅ Payments toast -->
    <div class="toast" id="paymentsToast" aria-live="polite" aria-atomic="true">
      <div class="toast-head">
        <div class="toast-title" id="toastTitle">Pago confirmado</div>
        <div style="display:flex;gap:8px;align-items:center;">
          <div class="toast-pill">RETIRO</div>
          <button class="toast-x" id="toastClose" type="button" aria-label="Cerrar">✕</button>
        </div>
      </div>
      <div class="toast-body">
        <div class="toast-logo">
          <img id="toastLogo" src="img/mach.png" alt="Método" />
        </div>
        <div class="toast-lines">
          <div class="line1" id="toastLine1">Usuario • Método</div>
          <div class="line2" id="toastLine2">$0 CLP</div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
